# ks-scout configuration
# Copy to ~/.config/ks-scout/config.toml and customise.
# All fields are optional — defaults shown below.

[llm]
# provider    = "deepseek"         # "groq" or "deepseek"
# model       = "deepseek-v4-flash"    # deepseek: deepseek-v4-flash | groq: llama-3.3-70b-versatile
# api_key_env = "***REMOVED-LEAKED-KEY***" # env var holding your API key (GROQ_API_KEY for groq)

[cache]
project_list_ttl_hours  = 6
project_detail_ttl_days = 7
db_path                 = "~/.cache/ks-scout/cache.db"

[http]
user_agent      = "ks-scout/0.1 (personal research tool)"
rate_limit_rps  = 1.0
